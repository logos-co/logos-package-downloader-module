'https://cache.nixos.org'...\ncopying path '/nix/store/95k9rsn1zsw1yvir8mj824ldhf90i4qw-gcc-wrapper-14.3.0' from 'https://cache.nixos.org'...\ncopying path '/nix/store/in4vcga7bs20ghhgdycvqcrp77mgdq7x-make-binary-wrapper-hook' from 'https://cache.nixos.org'...\ncopying path '/nix/store/jrw7q6v8q74hhv43zgpq7i4jmxj9nwlj-stdenv-linux' from 'https://cache.nixos.org'...\ncopying path '/nix/store/rhz52ck7r0m764pvdrygky4ph9amgxim-wrap-qt6-apps-no-gui-hook' from 'https://cache.nixos.org'...\nbuilding '/nix/store/h8ca6fqqw9p2ry811alz3g9y7zyvvn8z-logos-package-downloader-lib-1.0.0.drv'...\nbuilding '/nix/store/wv5fj8faml3kbs867ld2jqq2dczp962f-logos-package_downloader-module-lib-1.0.0.drv'...\nbuilding '/nix/store/1y3lr7dx9lsl74ryfsl9jfvpdqf3yg1z-logos-package_downloader-module-lib-lgx-1.0.0.drv'...\n", "note": ""}, {"kind": "run", "cmd": "ls pkgdl-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "pkgdl-lgx/logos-package_downloader-module-lib.lgx\n", "note": ""}]}, {"md": "### 3.2 Seed the modules directory with the bundled capability module\n\n`package_downloader` is loaded through the host's capability layer, so the\nmodules directory also needs the `capability_module` that ships with\n`logoscore`. Copy it across first.\n\n```bash\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.3 Install the .lgx with lgpm\n\nInstall the freshly-built package into `./modules`. `package_downloader` is a\n`core` module, so it goes to `--modules-dir`. The package is unsigned (a local\ndev build), so we pass `--allow-unsigned`.\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file pkgdl-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file pkgdl-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "Installing from file: pkgdl-lgx/logos-package_downloader-module-lib.lgx... done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "### 3.4 Confirm the install\n\nScan the directory and confirm the module landed:\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules list\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules list", "status": "pass", "exit_code": 0, "output": "Found 2 installed module(s):\n\nNAME                           VERSION         TYPE       CATEGORY       \n----------------------------------------------------------------------\ncapability_module              1.0.0           core       security       \npackage_downloader             1.0.0           core       management     \n", "note": ""}]}, {"md": "## Step 4: Run the daemon and call the module\n\nStart `logoscore` in daemon mode pointed at `./modules`, then use the client\nsubcommands to load `package_downloader`, introspect it, and call its\nrepository-management methods. Daemon output is captured in `logs.txt`.", "execs": []}, {"md": "### 4.1 Start the daemon\n\nStart logoscore in daemon mode in the background, capturing output to `logs.txt`:\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```\n\nThe `-D` flag starts the daemon. The client subcommands below connect to this\nrunning process via the config written under `~/.logoscore/`.", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.2 Check daemon status\n\nVerify the daemon is running:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":5291,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"package_downloader\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":1}}\n", "note": ""}]}, {"md": "### 4.3 List discovered modules\n\n`package_downloader` should be visible in the scan directory:\n\n```bash\nlogoscore list-modules\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore list-modules", "status": "pass", "exit_code": 0, "output": "[{\"name\":\"package_downloader\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}]\n", "note": ""}]}, {"md": "### 4.4 Load the module\n\nLoad `package_downloader` into the running daemon:\n\n```bash\nlogoscore load-module package_downloader\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module package_downloader", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"package_downloader\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.5 Confirm the module is loaded\n\nRe-run `status`; the module that was `not_loaded` before now reports `loaded`:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":5291,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"package_downloader\",\"status\":\"loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":2,\"not_loaded\":0}}\n", "note": ""}]}, {"md": "### 4.6 Introspect the module with module-info\n\n`module-info` lists the `Q_INVOKABLE` methods the module exposes \u2014 the same\nmethods you can `call`:\n\n```bash\nlogoscore module-info package_downloader\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore module-info package_downloader", "status": "pass", "exit_code": 0, "output": "{\"events\":[{\"name\":\"catalogChanged\",\"signature\":\"catalogChanged()\",\"type\":\"event\"}],\"methods\":[{\"isInvokable\":true,\"name\":\"addRepository\",\"parameters\":[{\"name\":\"url\",\"type\":\"QString\"}],\"returnType\":\"QVariantMap\",\"signature\":\"addRepository(QString)\",\"type\":\"method\"},{\"isInvokable\":true,\"name\":\"removeRepository\",\"parameters\":[{\"name\":\"url\",\"type\":\"QString\"}],\"returnType\":\"QVariantMap\",\"signature\":\"removeRepository(QString)\",\"type\":\"method\"},{\"isInvokable\":true,\"name\":\"setRepositoryEnabled\",\"parameters\":[{\"name\":\"url\",\"type\":\"QString\"},{\"name\":\"enabled\",\"type\":\"bool\"}],\"returnType\":\"QVariantMap\",\"signature\":\"setRepositoryEnabled(QString,bool)\",\"type\":\"method\"},{\"isInvokable\":true,\"name\":\"listRepositories\",\"returnType\":\"QVariantList\",\"signature\":\"listRepositories()\",\"type\":\"method\"},{\"isInvokable\":true,\"name\":\"refreshCatalog\",\"returnType\":\"QVariantMap\",\"signature\":\"refreshCatalog()\",\"type\":\"method\"},{\"isInvokable\":true,\"name\":\"getCatalog\",\"returnType\":\"QVariantList\",\"signature\":\"getCatalog()\",\"type\":\"method\"},{\"isInvokable\":true,\"name\":\"getCatalogForRepo\",\"parameters\":[{\"name\":\"repoUrlOrName\",\"type\":\"QString\"}],\"returnType\":\"QVariantList\",\"signature\":\"getCatalogForRepo(QString)\",\"type\":\"method\"},{\"isInvokable\":true,\"name\":\"downloadPinned\",\"parameters\":[{\"name\":\"repoUrlOrName\",\"type\":\"QString\"},{\"name\":\"packageName\",\"type\":\"QString\"},{\"name\":\"version\",\"type\":\"QString\"},{\"name\":\"rootHash\",\"type\":\"QString\"}],\"returnType\":\"QVariantMap\",\"signature\":\"downloadPinned(QString,QString,QString,QString)\",\"type\":\"method\"},{\"isInvokable\":true,\"name\":\"downloadResolvedDependencies\",\"parameters\":[{\"name\":\"dependenciesJson\",\"type\":\"QString\"}],\"returnType\":\"QVariantList\",\"signature\":\"downloadResolvedDependencies(QString)\",\"type\":\"method\"},{\"isInvokable\":true,\"name\":\"resolveDependencies\",\"parameters\":[{\"name\":\"dependenciesJson\",\"type\":\"QString\"},{\"name\":\"installedPackagesJson\",\"type\":\"QString\"}],\"returnType\":\"QVariantList\",\"signature\":\"resolveDependencies(QString,QString)\",\"type\":\"method\"}],\"name\":\"package_downloader\",\"status\":\"loaded\"}\n", "note": ""}]}, {"md": "### 4.7 List the configured repositories\n\n`listRepositories` returns the repositories the catalog is assembled from \u2014 the\nbuilt-in default repository is always among them (its URL is compiled into the\nwrapped `lgpd` library). The call triggers a best-effort metadata refresh of that\nrepository, but it returns deterministically whether or not the fetch succeeds, so\nthe `\"result\"` envelope is always present:\n\n```bash\nlogoscore call package_downloader listRepositories\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call package_downloader listRepositories", "status": "pass", "exit_code": 0, "output": "{\"method\":\"listRepositories\",\"module\":\"package_downloader\",\"result\":[{\"description\":\"Curated official Logos modules.\",\"displayName\":\"Logos Official\",\"enabled\":true,\"homepage\":\"https://github.com/logos-co/logos-modules-release\",\"indexUrl\":\"https://github.com/logos-co/logos-modules-release/releases/download/index/index.json\",\"isDefault\":true,\"name\":\"logos-modules-official\",\"resolveError\":\"\",\"trustedSignerDids\":[],\"url\":\"https://raw.githubusercontent.com/logos-co/logos-modules-release/refs/heads/main/logos-repo.json\"}],\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.8 Reject an empty repository URL (pure validation, no network)\n\n`addRepository` validates its argument before any fetch. Passing an empty URL is\nrejected with `success: false` \u2014 a deterministic, offline validation round-trip:\n\n```bash\nlogoscore call package_downloader addRepository \"\"\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call package_downloader addRepository \"\"", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addRepository\",\"module\":\"package_downloader\",\"result\":{\"error\":\"url is empty\",\"success\":false},\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.9 Stop the daemon\n\nShut the daemon down cleanly:\n\n```bash\nlogoscore stop\n```\n\nThe daemon removes its state file and exits.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.10 Confirm the daemon has stopped\n\nWith no daemon running, the client reports `not_running` and exits non-zero, so\nwe add `|| true` to let the doc-test assert on the output:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"b3c8c5f69807\",\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
